# Maintenance & Scaling Guide

## 1. Supervisor for Queue Workers
Ensure your queue worker is always running to process events asynchronously.
Create `/etc/supervisor/conf.d/laravel-worker.conf`:

```ini
[program:laravel-worker]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/html/artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=8
redirect_stderr=true
stdout_logfile=/var/www/html/storage/logs/worker.log
stopwaitsecs=3600
```

## 2. Redis Configuration
Ensure Redis is configured to handle high throughput. Increase the `maxclients` if necessary in `redis.conf`.

## 3. Rate Limiting
The system already uses Redis-based rate limiting per project. Monitor Redis memory usage to ensure limits are tracked correctly.
