# Nginx Configuration for CNAME-based SaaS Tracking

To support 1000+ custom domains pointing to your Laravel backend, use the following configuration.

## 1. Main Application & Dynamic Domain Server
Add this server block to your Nginx configuration (e.g., `/etc/nginx/sites-available/tracking.conf`).

```nginx
server {
    listen 80;
    listen [::]:80;
    
    # Catch-all for all custom domains pointing to this server
    server_name _; 

    root /var/www/html/public;
    index index.php index.html;

    # Handle SSL via Certbot (Certbot will add its own directives here)
    
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.ht {
        deny all;
    }
}
```

## 2. Automated SSL Provisioning
For a SaaS with many custom domains, use **Certbot with Nginx** in a scriptable way.

### Option A: Certbot (Standard)
When a user clicks "Connect Domain", you can trigger a background job to run:
```bash
sudo certbot --nginx -d data.user-site.com --non-interactive --agree-tos --email your-admin@email.com
```

### Option B: Wildcard (If using subdomains of your own domain)
If you are only allowing `*.yourdomain.com`, use a wildcard SSL.

